name: CI/CD

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Angular build artifacts
        uses: actions/cache@v6
        with:
          path: frontend/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('frontend/package-lock.json', 'frontend/angular.json', 'frontend/tsconfig*.json', 'frontend/src/**/*.ts', 'frontend/src/**/*.html', 'frontend/src/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-results
          path: frontend/test-results/
          if-no-files-found: error

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: error

      - name: Build production bundle
        run: npm run build:production

      - name: Verify production output
        run: |
          test -f dist/the-code-tickler/browser/index.html
          test -f dist/the-code-tickler/browser/_redirects
          ! find dist/the-code-tickler/browser -name '*.map' -print -quit | grep .

      - name: Upload production build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-production-build
          path: frontend/dist/the-code-tickler/browser/
          if-no-files-found: error

      - name: Write CI summary
        if: always()
        run: |
          {
            echo "### Frontend CI"
            echo
            echo "- Test command: \`npm run test:ci\`"
            echo "- Production build: \`npm run build:production\`"
            echo "- Output directory: \`frontend/dist/the-code-tickler/browser\`"
            echo
            if [ -f coverage/the-code-tickler/coverage-summary.json ]; then
              node -e 'const summary = require("./coverage/the-code-tickler/coverage-summary.json").total; console.log("| Metric | Covered | Total | Pct |"); console.log("| --- | ---: | ---: | ---: |"); for (const key of ["lines", "statements", "functions", "branches"]) { const row = summary[key]; console.log(`| ${key} | ${row.covered} | ${row.total} | ${row.pct}% |`); }'
            else
              echo "Coverage summary was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'development')
    environment: Cloudflare

    env:
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'the-code-tickler' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Angular build artifacts
        uses: actions/cache@v6
        with:
          path: frontend/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('frontend/package-lock.json', 'frontend/angular.json', 'frontend/tsconfig*.json', 'frontend/src/**/*.ts', 'frontend/src/**/*.html', 'frontend/src/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:production

      - name: Verify production output
        run: |
          test -f dist/the-code-tickler/browser/index.html
          test -f dist/the-code-tickler/browser/_redirects
          ! find dist/the-code-tickler/browser -name '*.map' -print -quit | grep .

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist/the-code-tickler/browser --project-name="${{ env.CLOUDFLARE_PROJECT_NAME }}" --branch="${{ github.ref_name }}" --commit-dirty=true

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "### Frontend Deploy"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Project: \`${{ env.CLOUDFLARE_PROJECT_NAME }}\`"
            echo "- Output directory: \`frontend/dist/the-code-tickler/browser\`"
            echo "- Wrangler Action: \`cloudflare/wrangler-action@v4\`"
          } >> "$GITHUB_STEP_SUMMARY"
