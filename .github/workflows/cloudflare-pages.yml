name: Cloudflare Pages

on:
  push:
    branches:
      - master
      - deploy/cloudflare-pages
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Angular build artifacts
        uses: actions/cache@v6
        with:
          path: frontend/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('frontend/package-lock.json', 'frontend/angular.json', 'frontend/tsconfig*.json', 'frontend/src/**/*.ts', 'frontend/src/**/*.html', 'frontend/src/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

      - name: Build production bundle
        run: npm run build

      - name: Verify Cloudflare Pages output
        run: |
          test -f dist/the-code-tickler/browser/index.html
          test -f dist/the-code-tickler/browser/_redirects

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment: Cloudflare

    env:
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'the-code-tickler' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Angular build artifacts
        uses: actions/cache@v6
        with:
          path: frontend/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('frontend/package-lock.json', 'frontend/angular.json', 'frontend/tsconfig*.json', 'frontend/src/**/*.ts', 'frontend/src/**/*.html', 'frontend/src/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify Cloudflare Pages output
        run: |
          test -f dist/the-code-tickler/browser/index.html
          test -f dist/the-code-tickler/browser/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist/the-code-tickler/browser --project-name="${{ env.CLOUDFLARE_PROJECT_NAME }}" --branch="${{ github.ref_name }}"
