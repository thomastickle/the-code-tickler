<section class="mx-auto w-[min(1120px,calc(100%_-_2rem))] py-10 pb-4 md:py-16 md:pb-4 lg:py-20 lg:pb-4">
  <p class="eyebrow">Contact</p>
  <h1 class="m-0 max-w-[13ch] text-[clamp(2.6rem,8vw,5.5rem)] font-black leading-[0.92] drop-shadow-[0_0_34px_rgba(139,92,246,0.26)] max-sm:text-[3.2rem]">
    Reach out without a form in the middle
  </h1>
  <p class="max-w-[46rem] text-[clamp(1.05rem,2.2vw,1.35rem)] leading-relaxed text-surface-400">
    The first version keeps contact simple: direct links, no backend, and no static form provider to maintain.
  </p>
</section>

<section class="mx-auto grid w-[min(1120px,calc(100%_-_2rem))] items-start gap-4 py-10 md:py-16 lg:grid-cols-[minmax(0,1fr)_minmax(16rem,0.45fr)] lg:py-20">
  <p-card class="portfolio-card contact-card">
    <ng-template #title>{{ profile.brand }}</ng-template>
    <ng-template #subtitle>{{ profile.availability }}</ng-template>
    <p class="text-surface-400 leading-relaxed">{{ profile.headline }}</p>
    <div class="mt-4 flex flex-wrap items-center gap-3">
      <p-tag [value]="profile.location" icon="pi pi-map-marker" rounded />
      <p-tag value="Cloudflare Pages-ready" icon="pi pi-cloud" severity="info" rounded />
    </div>
  </p-card>

  <div class="grid gap-3 [&_.p-button]:justify-center">
    @for (link of links; track link.label) {
      <a pButton [href]="link.href" target="_blank" rel="noopener" [label]="link.label" [icon]="link.icon"></a>
    }
    <a
      pButton
      href="mailto:hello@thecodetickler.com?subject=Resume%20request"
      label="Request resume"
      icon="pi pi-file"
      severity="secondary"
      outlined
    ></a>
  </div>
</section>
