<header class="site-shell-bar fixed inset-x-0 top-0 z-50">
  <div class="site-shell-inner flex items-center gap-4 py-3">
    <p-button
      styleClass="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      [icon]="darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      rounded
      text
    />

    <div class="brandmark-menu-root">
      <button
        type="button"
        class="brandmark-trigger"
        (click)="toggleNavigation()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="brandmark-navigation"
        aria-label="Toggle navigation menu"
      >
        <img
          src="brandmark/brand-mark-1x.webp"
          srcset="
            brandmark/brand-mark-1x.webp 1x,
            brandmark/brand-mark-2x.webp 2x,
            brandmark/brand-mark-3x.webp 3x
          "
          alt=""
          width="74"
          height="52"
          aria-hidden="true"
        />
        <span class="brandmark-trigger-copy">
          <span class="brandmark-trigger-name">The Code Tickler</span>
          <span class="brandmark-trigger-page">{{ currentPageLabel() }}</span>
        </span>
        <span
          class="pi pi-chevron-down brandmark-menu-chevron hidden sm:inline"
          aria-hidden="true"
        ></span>
      </button>

      @if (menuOpen()) {
        <section
          id="brandmark-navigation"
          class="brandmark-menu-popout"
          aria-label="Primary navigation"
        >
          <nav class="grid gap-2" aria-label="Primary navigation">
            @for (item of navItems; track item.path) {
              <a
                class="brandmark-menu-link"
                [routerLink]="item.path"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: item.path === '/' }"
                (click)="closeNavigation()"
              >
                <span
                  class="brandmark-menu-link-icon"
                  [class]="item.icon"
                  aria-hidden="true"
                ></span>
                <span class="brandmark-menu-link-copy">
                  <span class="brandmark-menu-link-label">{{ item.label }}</span>
                  <span class="brandmark-menu-link-description">{{ item.description }}</span>
                </span>
              </a>
            }
          </nav>
        </section>
      }
    </div>
  </div>
</header>

@if (menuOpen()) {
  <div
    class="navigation-scrim fixed inset-0 z-10"
    aria-hidden="true"
    (click)="closeNavigation()"
  ></div>
}
