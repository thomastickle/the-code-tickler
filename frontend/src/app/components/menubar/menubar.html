<p-toolbar class="site-toolbar sticky top-0 z-10 block">
  <ng-template #start>
    <a routerLink="/" class="inline-flex items-center gap-3 font-extrabold no-underline" aria-label="The Code Tickler home">
      <img
        src="brand-mark-1x.png"
        srcset="brand-mark-1x.png 1x, brand-mark-2x.png 2x, brand-mark-3x.png 3x"
        alt=""
        class="brand-glyph h-11 w-auto"
        width="74"
        height="52"
        aria-hidden="true"
      >
      <span>The Code Tickler</span>
    </a>
  </ng-template>

  <ng-template #end>
    <div class="flex items-center justify-end gap-3">
      <nav class="site-nav hidden items-center justify-end gap-1 md:flex"
           aria-label="Primary navigation">
        @for (item of navItems; track item.path) {
          <a
            class="rounded-full px-3 py-2 font-bold text-surface-400 no-underline"
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          >
            {{ item.label }}
          </a>
          @if (!$last) {
            <span class="text-surface-400 opacity-50" aria-hidden="true">|</span>
          }
        }
      </nav>

      <p-button
        styleClass="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        [icon]="darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        rounded
        text
      />

      <span class="md:hidden">
        <p-button
          styleClass="mobile-menu-button"
          (click)="openMobileMenu()"
          aria-label="Open navigation menu"
          icon="pi pi-bars"
          rounded
          text
        />
      </span>
    </div>
  </ng-template>
</p-toolbar>

@defer (when mobileMenuLoaded()) {
  <app-mobile-nav-drawer
    [open]="mobileMenuOpen()"
    [navItems]="navItems"
    (openChange)="updateMobileMenuVisibility($event)"
    (navigate)="closeMobileMenu()"
  />
}
