<div class="site-shell">
  <header class="site-header">
    <a routerLink="/" class="brand-link" aria-label="The Code Tickler home">
      <img src="feather-logo.svg" alt="" class="brand-glyph" width="44" height="44" aria-hidden="true">
      <span>The Code Tickler</span>
    </a>

    <div class="nav-cluster">
      <nav class="site-nav" aria-label="Primary navigation">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <i [class]="darkMode() ? 'pi pi-sun' : 'pi pi-moon'" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <main>
    <router-outlet />
  </main>

  <footer class="site-footer">
    <span>The Code Tickler</span>
    <span>Built with Angular, PrimeNG, and Cloudflare Pages in mind.</span>
  </footer>
</div>
